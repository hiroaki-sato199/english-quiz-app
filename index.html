<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語穴埋め学習 シンプル版</title>
<style>
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;max-width:820px;margin:0 auto;padding:12px;background:#f5f7fb;color:#111827}.card{background:#fff;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 2px 10px #0001}h1{text-align:center;font-size:1.35rem}.row{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:12px;padding:12px 14px;font-weight:700;font-size:16px;margin:4px 0;cursor:pointer}.primary{background:#2563eb;color:#fff}.plain{background:#e5e7eb}.success{background:#16a34a;color:#fff}.danger{background:#dc2626;color:#fff}.star{background:#f59e0b;color:#fff}.notice{white-space:pre-wrap;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:12px;border-radius:12px}.ok{white-space:pre-wrap;background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;padding:12px;border-radius:12px}.err{white-space:pre-wrap;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:12px;border-radius:12px}.badge{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 10px;margin:2px;font-size:.86rem}.small{font-size:.9rem;color:#6b7280}.progress{font-weight:700;color:#6b7280;margin-bottom:14px}.jp{text-align:center;font-size:1.3rem;margin:20px 0}.en{text-align:center;font-size:1.12rem;line-height:1.9;margin:16px 0 20px}.answer-row{display:flex;align-items:center;gap:10px;margin:8px 0}.answer-label{min-width:36px;font-weight:800}input{width:100%;font-size:16px;padding:12px;border:1px solid #d1d5db;border-radius:12px}.correct{color:#16a34a}.wrong{color:#dc2626}.hidden{display:none!important}
</style>
</head>
<body>
<div class="card">
<h1>英語穴埋め学習 シンプル版</h1>
<div id="status" class="notice">questions.json を自動読み込み中...</div>
<div class="row">
<button id="normalBtn" class="primary" type="button">通常学習</button>
<button id="reloadBtn" class="plain" type="button">再読み込み</button>
<button id="reviewBtn" class="plain" type="button">保存した問題を復習</button>
<button id="wrongBtn" class="plain" type="button">間違えた問題を復習</button>
<button id="clearBtn" class="danger" type="button">履歴を消去</button>
</div>
<div id="stats"></div>
<p class="small">同じフォルダの <strong>questions.json</strong> を自動で読み込みます。手動読み込み機能とJSON編集機能はありません。</p>
</div>

<div id="quizCard" class="card"><p>questions.json を読み込み中です。</p></div>

<script>
(function(){
"use strict";
const nums=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
const REVIEW_KEY="simpleQuizReviewIds";
const WRONG_KEY="simpleQuizWrongIds";
let allQuestions=[], questions=[], current=0, correctCount=0, modeName="通常学習";
const $=id=>document.getElementById(id);

function setStatus(message,type){$("status").textContent=message;$("status").className=type||"notice";}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
function normalize(s){return String(s||"").trim().toLowerCase().replace(/\s+/g," ");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getIds(key){try{return JSON.parse(localStorage.getItem(key)||"[]").map(String);}catch(e){return[];}}
function setIds(key,values){localStorage.setItem(key,JSON.stringify([...new Set(values.map(String))]));}
function updateStats(){
  $("stats").innerHTML=`<span class="badge">総問題数 ${allQuestions.length}</span>
  <span class="badge">保存済み ${getIds(REVIEW_KEY).length}</span>
  <span class="badge">間違えた問題 ${getIds(WRONG_KEY).length}</span>`;
}
function parseQuestionJSON(text){
  let t=String(text||"").trim().replace(/^\uFEFF/,"");
  if(!t)throw new Error("questions.json が空です。");
  const data=JSON.parse(t);
  if(Array.isArray(data))return data;
  if(data&&Array.isArray(data.questions))return data.questions;
  if(data&&Array.isArray(data.data))return data.data;
  throw new Error("JSONの最上位は配列、または {questions:[...]} にしてください。");
}
function validateQuestions(data){
  if(!Array.isArray(data))throw new Error("JSONの最上位は配列にしてください。");
  return data.map((q,i)=>{
    if(!q||typeof q!=="object")throw new Error(`${i+1}番目がオブジェクトではありません。`);
    if(q.id===undefined||q.id===null||q.id==="")q.id=i+1;
    if(typeof q.jp!=="string")throw new Error(`${i+1}番目の jp がありません。`);
    if(typeof q.en!=="string")throw new Error(`${i+1}番目の en がありません。`);
    if(!Array.isArray(q.answers))throw new Error(`${i+1}番目の answers が配列ではありません。`);
    return {id:String(q.id),jp:q.jp,en:q.en,answers:q.answers.map(String)};
  });
}
async function loadQuestionsJson(){
  try{
    setStatus("questions.json を読み込み中...","notice");
    $("quizCard").innerHTML="<p>questions.json を読み込み中です。</p>";
    const res=await fetch("questions.json?cache="+Date.now(),{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const text=await res.text();
    allQuestions=validateQuestions(parseQuestionJSON(text));
    updateStats();
    setStatus(`questions.json から ${allQuestions.length}問を読み込みました。`,"ok");
    startNormal();
  }catch(e){
    setStatus("questions.json の読み込みに失敗しました。\n\n原因:\n"+e.message+
    "\n\n確認してください:\n- index.html と questions.json が同じフォルダにある\n- ファイル名が questions.json になっている\n- JSON形式が正しい\n- ブラウザで /questions.json を直接開ける","err");
    $("quizCard").innerHTML="<p>問題を読み込めませんでした。</p>";
  }
}
function renderQuizCard(){
  $("quizCard").innerHTML=`
  <div id="progress" class="progress"></div>
  <div id="jp" class="jp"></div>
  <div id="en" class="en"></div>
  <div id="inputs"></div>
  <button id="checkBtn" class="primary" type="button">答え合わせ</button>
  <div id="result"></div>
  <div id="reviewArea" class="hidden"><button id="saveReviewBtn" class="star" type="button">☆ 復習リストに追加</button></div>
  <button id="nextBtn" class="success hidden" type="button">次の問題</button>`;
  $("checkBtn").addEventListener("click",checkAnswer);
  $("saveReviewBtn").addEventListener("click",saveForReview);
  $("nextBtn").addEventListener("click",nextQuestion);
}
function startNormal(){
  if(allQuestions.length===0){setStatus("問題が読み込まれていません。","err");return;}
  renderQuizCard();modeName="通常学習";questions=shuffle([...allQuestions]);current=0;correctCount=0;loadQuestion();
}
function startReview(){
  const ids=getIds(REVIEW_KEY);
  questions=allQuestions.filter(q=>ids.includes(String(q.id)));
  if(questions.length===0){alert("保存した問題はありません。");return;}
  renderQuizCard();modeName="保存した問題の復習";questions=shuffle(questions);current=0;correctCount=0;loadQuestion();
}
function startWrong(){
  const ids=getIds(WRONG_KEY);
  questions=allQuestions.filter(q=>ids.includes(String(q.id)));
  if(questions.length===0){alert("間違えた問題はありません。");return;}
  renderQuizCard();modeName="間違えた問題の復習";questions=shuffle(questions);current=0;correctCount=0;loadQuestion();
}
function loadQuestion(){
  const q=questions[current];
  $("progress").textContent=`${modeName}：問題 ${current+1}/${questions.length}`;
  $("jp").textContent=q.jp;
  $("en").textContent=q.en;
  $("inputs").innerHTML=q.answers.map((ans,i)=>{
    const label=nums[i]||"("+String(i+1)+")";
    return `<div class="answer-row"><div class="answer-label">${label}</div><input id="ans${i}" placeholder="${label} の答え" autocomplete="off"></div>`;
  }).join("");
  $("result").innerHTML="";
  $("reviewArea").classList.add("hidden");
  $("nextBtn").classList.add("hidden");
  $("checkBtn").classList.remove("hidden");
  $("saveReviewBtn").textContent=getIds(REVIEW_KEY).includes(String(q.id))?"★ 復習リスト登録済み":"☆ 復習リストに追加";
  document.querySelector("#inputs input")?.focus();
}
function checkAnswer(){
  const q=questions[current];
  let ok=true, html="";
  q.answers.forEach((ans,i)=>{
    const label=nums[i]||"("+String(i+1)+")";
    if(normalize($("ans"+i).value)===normalize(ans)){
      html+=`<div class="correct">✓ ${label} ${escapeHtml(ans)}</div>`;
    }else{
      ok=false;
      html+=`<div class="wrong">✗ ${label} 正解: ${escapeHtml(ans)}</div>`;
    }
  });
  if(ok){correctCount++;html="<h3 class='correct'>正解！</h3>"+html;}
  else{
    html="<h3 class='wrong'>不正解</h3>"+html;
    const wrong=getIds(WRONG_KEY);wrong.push(String(q.id));setIds(WRONG_KEY,wrong);
  }
  $("result").innerHTML=html;
  $("reviewArea").classList.remove("hidden");
  $("nextBtn").classList.remove("hidden");
  $("checkBtn").classList.add("hidden");
  updateStats();
}
function saveForReview(){
  const ids=getIds(REVIEW_KEY);
  ids.push(String(questions[current].id));
  setIds(REVIEW_KEY,ids);
  $("saveReviewBtn").textContent="★ 復習リスト登録済み";
  updateStats();
}
function nextQuestion(){
  current++;
  if(current>=questions.length){
    $("quizCard").innerHTML=`<h2>学習終了</h2><p>${modeName}</p><h3>正解数 ${correctCount}/${questions.length}</h3><p>正答率 ${Math.round(correctCount/questions.length*100)}%</p><button id="againBtn" class="primary" type="button">通常学習に戻る</button>`;
    $("againBtn").addEventListener("click",startNormal);
    return;
  }
  loadQuestion();
}
function clearHistory(){
  if(confirm("復習リストと間違えた履歴を消去しますか？")){
    localStorage.removeItem(REVIEW_KEY);
    localStorage.removeItem(WRONG_KEY);
    updateStats();
    setStatus("履歴を消去しました。","notice");
  }
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const checkBtn=$("checkBtn"), nextBtn=$("nextBtn");
    if(checkBtn&&!checkBtn.classList.contains("hidden"))checkAnswer();
    else if(nextBtn&&!nextBtn.classList.contains("hidden"))nextQuestion();
  }
});
$("normalBtn").addEventListener("click",startNormal);
$("reloadBtn").addEventListener("click",loadQuestionsJson);
$("reviewBtn").addEventListener("click",startReview);
$("wrongBtn").addEventListener("click",startWrong);
$("clearBtn").addEventListener("click",clearHistory);
updateStats();
loadQuestionsJson();
})();
</script>
</body>
</html>

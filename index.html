<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語穴埋め学習</title>
<style>
:root{
  color-scheme:light;
  --blue:#2563eb;--green:#16a34a;--red:#dc2626;
  --yellow:#d97706;--purple:#7c3aed;--gray:#6b7280;
  --light:#e5e7eb;--bg:#f5f7fb;
}
*{box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",
  "Yu Gothic",Meiryo,sans-serif;
  max-width:760px;margin:0 auto;padding:16px;background:var(--bg);color:#111827;
}
.card{
  background:#fff;padding:22px;margin-bottom:16px;border-radius:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
h1{text-align:center;margin:0 0 20px}
h2{margin:20px 0 10px;font-size:1.18rem}
label{display:block;font-weight:700;margin:12px 0 6px}
input,button{width:100%;padding:13px;font-size:1rem;border-radius:9px}
input{border:1px solid #d1d5db}
button{border:0;margin-top:10px;cursor:pointer;font-weight:700}
button:disabled{opacity:.5;cursor:not-allowed}
.primary{background:var(--blue);color:#fff}
.success{background:var(--green);color:#fff}
.warning{background:var(--yellow);color:#fff}
.purple{background:var(--purple);color:#fff}
.secondary{background:var(--light);color:#111827}
.danger-outline{background:#fff;color:var(--red);border:1px solid #fecaca}
.page-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end}
.page-separator{padding-bottom:14px;color:var(--gray)}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hidden{display:none!important}
.muted{color:var(--gray);font-size:.92rem;line-height:1.6}
.error{color:var(--red);font-weight:700;margin-top:12px}
.progress{font-weight:700;color:#4b5563;margin-bottom:8px}
.mode-label{text-align:center;color:var(--purple);font-weight:700;margin-bottom:6px}
.page-label{text-align:center;color:var(--blue);font-weight:700;margin-bottom:18px}
.jp{font-size:1.4rem;text-align:center;margin:20px 0}
.en{font-size:1.2rem;text-align:center;line-height:1.9;margin:20px 0}
.answer-row{margin:9px 0}
.correct{color:#15803d}
.wrong{color:#b91c1c}
.result{margin-top:18px;line-height:1.7}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.summary{text-align:center}
.count-badge{
  display:inline-block;min-width:2em;padding:2px 8px;margin-left:4px;border-radius:999px;
  background:rgba(255,255,255,.25)
}
.small{font-size:.86rem}

.notice-box{
  background:#fff7ed;
  border:2px solid #fdba74;
  padding:18px;
  margin-bottom:16px;
  border-radius:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.notice-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.notice-box h2{
  margin:0;
  color:#9a3412;
  font-size:1.15rem;
}
.notice-toggle{
  width:auto;
  min-width:86px;
  margin:0;
  padding:8px 12px;
  background:#fff;
  color:#9a3412;
  border:1px solid #fdba74;
  font-size:.92rem;
}
.notice-toggle:hover{
  background:#ffedd5;
}
.notice-content{
  margin-top:10px;
  line-height:1.75;
  overflow-wrap:anywhere;
}
.notice-content p{
  margin:7px 0;
}
.notice-content ul,
.notice-content ol{
  margin:7px 0;
  padding-left:1.5em;
}

@media(max-width:520px){
  body{padding:10px}.card{padding:17px}.jp{font-size:1.25rem}.en{font-size:1.1rem}
  .review-grid,.action-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!--
============================================================
【使用上の注意・連絡事項の編集場所】

下の <div class="notice-content"> から </div> までの内容を、
HTMLファイル内で直接書き換えてください。

使用できる例：
<p>文章</p>
<ul>
  <li>箇条書き</li>
</ul>
<strong>太字</strong>
<a href="https://example.com">リンク</a>

このコメント部分は画面には表示されません。
============================================================
-->
<section class="notice-box">
  <div class="notice-header">
    <h2>使用上の注意・連絡事項</h2>
    <button
      id="noticeToggle"
      class="notice-toggle"
      type="button"
      aria-expanded="true"
      aria-controls="noticeContent"
      onclick="toggleNotice()"
    >閉じる</button>
  </div>

  <div id="noticeContent" class="notice-content">
    <!-- ↓ この中を手動で編集してください ↓ -->

    <p>ここに使用上の注意や連絡事項を入力してください。</p>
    <ul>
      <li>例：問題データを更新しました。</li>
      <li>例：不具合があれば管理者へ連絡してください。</li>
    </ul>

    <!-- ↑ この中を手動で編集してください ↑ -->
  </div>
</section>

<section id="setupCard" class="card">
  <h1>英語穴埋め学習</h1>
  <p id="loadStatus" class="muted">問題データを読み込んでいます。</p>

  <div id="pageControls" class="hidden">
    <h2>ページを指定して出題</h2>
    <div class="page-row">
      <div>
        <label for="startPage">開始ページ</label>
        <input id="startPage" type="number" inputmode="numeric" min="1" placeholder="例：315">
      </div>
      <div class="page-separator">～</div>
      <div>
        <label for="endPage">終了ページ</label>
        <input id="endPage" type="number" inputmode="numeric" min="1" placeholder="省略可">
      </div>
    </div>
    <p class="muted">
      1ページだけの場合は開始ページだけ入力してください。<br>
      例：315ページだけ →「315」、315～321ページ →「315」「321」
    </p>
    <button class="primary" onclick="startPageQuiz()">指定したページから出題</button>
    <button class="secondary" onclick="startAllPages()">全ページから出題</button>

    <h2>復習する</h2>
    <div class="review-grid">
      <button id="savedReviewBtn" class="warning" onclick="startSavedReview()">
        ★ 保存した問題 <span id="savedCount" class="count-badge">0</span>
      </button>
      <button id="wrongReviewBtn" class="purple" onclick="startWrongReview()">
        ↻ 間違えた問題 <span id="wrongCount" class="count-badge">0</span>
      </button>
    </div>
    <div class="review-grid">
      <button id="clearSavedBtn" class="danger-outline small" onclick="clearSavedQuestions()">保存リストを空にする</button>
      <button id="clearWrongBtn" class="danger-outline small" onclick="clearWrongQuestions()">間違いリストを空にする</button>
    </div>
    <p class="muted">
      復習データは、このブラウザ内に保存されます。別の端末や別のブラウザには引き継がれません。
    </p>
    <div id="setupMessage" class="error"></div>
  </div>
</section>

<section id="quizCard" class="card hidden">
  <div id="modeLabel" class="mode-label"></div>
  <div id="progress" class="progress"></div>
  <div id="currentPage" class="page-label"></div>
  <div id="jp" class="jp"></div>
  <div id="en" class="en"></div>
  <div id="inputs"></div>

  <button id="checkBtn" class="primary" onclick="checkAnswer()">答え合わせ</button>

  <div id="afterAnswer" class="hidden">
    <button id="saveBtn" class="warning" onclick="toggleSavedQuestion()">★ 復習リストに保存</button>
    <div class="action-row">
      <button id="nextBtn" class="success" onclick="nextQuestion()">次の問題</button>
      <button class="secondary" onclick="returnToMenu()">メニューに戻る</button>
    </div>
  </div>
  <div id="result" class="result"></div>
</section>

<script>
const DATA_FILE = "questions.json";
const SAVED_KEY = "englishQuizSavedQuestionIdsV2";
const WRONG_KEY = "englishQuizWrongQuestionIdsV2";
const nums = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
              "⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];

let allQuestions=[];
let questions=[];
let current=0;
let score=0;
let answered=false;
let currentMode="";

const $=id=>document.getElementById(id);

function readIdSet(key){
  try{
    const value=JSON.parse(localStorage.getItem(key)||"[]");
    return new Set(Array.isArray(value)?value.map(String):[]);
  }catch{
    return new Set();
  }
}
function writeIdSet(key,set){
  localStorage.setItem(key,JSON.stringify([...set]));
}
function questionKey(q){
  return String(q.id);
}
function getSavedSet(){return readIdSet(SAVED_KEY)}
function getWrongSet(){return readIdSet(WRONG_KEY)}

async function loadQuestions(){
  try{
    const response=await fetch(DATA_FILE+"?v="+Date.now(),{cache:"no-store"});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const data=await response.json();
    if(!Array.isArray(data))throw new Error("JSONの最上位が配列ではありません。");

    allQuestions=data.filter(q=>
      q&&typeof q==="object"&&q.id!==undefined&&q.page!==undefined&&
      typeof q.jp==="string"&&typeof q.en==="string"&&Array.isArray(q.answers)
    );
    if(allQuestions.length===0)throw new Error("使用できる問題が見つかりません。");

    cleanupStoredIds();

    const pages=allQuestions.flatMap(q=>pageBounds(q.page));
    const minPage=Math.min(...pages.map(p=>p[0]));
    const maxPage=Math.max(...pages.map(p=>p[1]));
    $("loadStatus").textContent=
      `${allQuestions.length.toLocaleString()}問を読み込みました。収録ページ：${minPage}～${maxPage}`;
    $("pageControls").classList.remove("hidden");
    updateReviewCounts();
    $("startPage").focus();
  }catch(error){
    $("loadStatus").innerHTML=
      `<span class="error">questions.jsonを読み込めませんでした。</span><br>`+
      `index.htmlとquestions.jsonを同じ場所に置き、GitHub PagesのURLから開いてください。<br>`+
      `詳細：${escapeHtml(error.message)}`;
  }
}

function cleanupStoredIds(){
  const valid=new Set(allQuestions.map(questionKey));
  for(const key of [SAVED_KEY,WRONG_KEY]){
    const set=readIdSet(key);
    const cleaned=new Set([...set].filter(id=>valid.has(id)));
    writeIdSet(key,cleaned);
  }
}

function updateReviewCounts(){
  const saved=getSavedSet();
  const wrong=getWrongSet();
  $("savedCount").textContent=saved.size;
  $("wrongCount").textContent=wrong.size;
  $("savedReviewBtn").disabled=saved.size===0;
  $("wrongReviewBtn").disabled=wrong.size===0;
  $("clearSavedBtn").disabled=saved.size===0;
  $("clearWrongBtn").disabled=wrong.size===0;
}

function pageBounds(value){
  if(typeof value==="number"&&Number.isFinite(value))return [[value,value]];
  if(typeof value==="string"){
    const text=value.trim();
    const single=text.match(/^(\d+)$/);
    if(single){const n=Number(single[1]);return [[n,n]]}
    const range=text.match(/^(\d+)\s*[-–—〜～]\s*(\d+)$/);
    if(range){
      const a=Number(range[1]),b=Number(range[2]);
      return [[Math.min(a,b),Math.max(a,b)]];
    }
  }
  return [];
}

function questionMatchesRange(q,start,end){
  return pageBounds(q.page).some(([a,b])=>a<=end&&b>=start);
}

function startPageQuiz(){
  $("setupMessage").textContent="";
  const start=Number($("startPage").value);
  const raw=$("endPage").value.trim();
  const end=raw===""?start:Number(raw);

  if(!Number.isInteger(start)||start<1||!Number.isInteger(end)||end<1){
    $("setupMessage").textContent="正しいページ番号を入力してください。";
    return;
  }
  const from=Math.min(start,end),to=Math.max(start,end);
  const selected=allQuestions.filter(q=>questionMatchesRange(q,from,to));
  if(selected.length===0){
    $("setupMessage").textContent=
      `${from}${from===to?"":"～"+to}ページの問題はありません。`;
    return;
  }
  begin(selected,from===to?`${from}ページ`:`${from}～${to}ページ`);
}

function startAllPages(){begin(allQuestions,"全ページ")}

function startSavedReview(){
  const ids=getSavedSet();
  const selected=allQuestions.filter(q=>ids.has(questionKey(q)));
  if(selected.length===0){updateReviewCounts();return}
  begin(selected,"保存した問題の復習");
}

function startWrongReview(){
  const ids=getWrongSet();
  const selected=allQuestions.filter(q=>ids.has(questionKey(q)));
  if(selected.length===0){updateReviewCounts();return}
  begin(selected,"間違えた問題の復習");
}

function begin(selected,mode){
  questions=[...selected];
  shuffle(questions);
  current=0;score=0;answered=false;currentMode=mode;
  $("setupCard").classList.add("hidden");
  $("quizCard").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion(){
  const q=questions[current];
  answered=false;
  $("modeLabel").textContent=currentMode;
  $("progress").textContent=`問題 ${current+1} / ${questions.length}`;
  $("currentPage").textContent=`ページ ${q.page}`;
  $("jp").textContent=q.jp;
  $("en").textContent=q.en;
  $("inputs").innerHTML=q.answers.map((_,i)=>
    `<div class="answer-row"><input id="ans${i}" autocomplete="off"
      autocapitalize="off" spellcheck="false"
      placeholder="${nums[i]||(i+1)} の答え"></div>`
  ).join("");
  $("result").innerHTML="";
  $("checkBtn").classList.remove("hidden");
  $("afterAnswer").classList.add("hidden");
  updateSaveButton();
  $("inputs").querySelector("input")?.focus();
}

function normalize(value){
  return String(value).trim().toLowerCase().replace(/[’‘]/g,"'").replace(/\s+/g," ");
}

function checkAnswer(){
  if(answered)return;
  const q=questions[current];
  let allCorrect=true;
  let html="";

  q.answers.forEach((answer,i)=>{
    const input=$(`ans${i}`);
    const ok=normalize(input?.value||"")===normalize(answer);
    if(ok){
      html+=`<div class="correct">✓ ${nums[i]||(i+1)} ${escapeHtml(answer)}</div>`;
    }else{
      allCorrect=false;
      html+=`<div class="wrong">✗ ${nums[i]||(i+1)} 正解：${escapeHtml(answer)}</div>`;
    }
    if(input)input.disabled=true;
  });

  const wrong=getWrongSet();
  const key=questionKey(q);
  if(allCorrect){
    score++;
    wrong.delete(key);
    html=`<h3 class="correct">正解！</h3>${html}`;
  }else{
    wrong.add(key);
    html=`<h3 class="wrong">不正解</h3>${html}
      <p class="muted">この問題を「間違えた問題」に登録しました。</p>`;
  }
  writeIdSet(WRONG_KEY,wrong);

  answered=true;
  $("result").innerHTML=html;
  $("checkBtn").classList.add("hidden");
  $("afterAnswer").classList.remove("hidden");
  updateSaveButton();
  updateReviewCounts();
  $("nextBtn").focus();
}

function toggleSavedQuestion(){
  const q=questions[current];
  const saved=getSavedSet();
  const key=questionKey(q);
  if(saved.has(key))saved.delete(key);else saved.add(key);
  writeIdSet(SAVED_KEY,saved);
  updateSaveButton();
  updateReviewCounts();
}

function updateSaveButton(){
  if(!questions.length)return;
  const saved=getSavedSet();
  const isSaved=saved.has(questionKey(questions[current]));
  $("saveBtn").textContent=isSaved?"★ 保存リストから外す":"☆ 復習リストに保存";
  $("saveBtn").className=isSaved?"secondary":"warning";
}

function nextQuestion(){
  current++;
  if(current>=questions.length){showSummary();return}
  loadQuestion();
}

function showSummary(){
  const rate=questions.length?Math.round(score/questions.length*100):0;
  $("quizCard").innerHTML=`
    <div class="summary">
      <h1>学習終了</h1>
      <p>${escapeHtml(currentMode)}</p>
      <h2>正解数 ${score} / ${questions.length}</h2>
      <p>正答率 ${rate}%</p>
      <button class="primary" onclick="location.reload()">メニューに戻る</button>
    </div>`;
}

function returnToMenu(){location.reload()}

function clearSavedQuestions(){
  if(!confirm("保存した問題をすべて削除しますか？"))return;
  localStorage.removeItem(SAVED_KEY);
  updateReviewCounts();
}
function clearWrongQuestions(){
  if(!confirm("間違えた問題をすべて削除しますか？"))return;
  localStorage.removeItem(WRONG_KEY);
  updateReviewCounts();
}

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}
function escapeHtml(value){
  return String(value).replace(/[&<>"']/g,ch=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  })[ch]);
}

document.addEventListener("keydown",event=>{
  if(event.key!=="Enter") return;
  event.preventDefault();
  if(!$("setupCard").classList.contains("hidden")){
    startPageQuiz();
    return;
  }
  if(!$("quizCard").classList.contains("hidden")){
    if(!$("checkBtn").classList.contains("hidden")){
      checkAnswer();
      return;
    }
    if(!$("nextBtn").classList.contains("hidden")){
      nextQuestion();
      return;
    }
  }
});


function toggleNotice(){
  const content = $("noticeContent");
  const button = $("noticeToggle");
  const isHidden = content.classList.toggle("hidden");

  button.textContent = isHidden ? "開く" : "閉じる";
  button.setAttribute("aria-expanded", String(!isHidden));
}

loadQuestions();
</script>
</body>
</html>
